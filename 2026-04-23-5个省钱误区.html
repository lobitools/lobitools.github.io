    <main class="article">
        <h2>5个你以为省钱其实更费钱的行为</h2>
        <h3>误区1：买便宜货</h3>
        <p>便宜的东西用不久，频繁更换反而花更多钱。质量好的能用5年，算下来更划算。</p>
        <h3>误区2：囤打折货</h3>
        <p>为了"省钱"买一堆用不上的东西，放到过期扔掉，这是最大的浪费。</p>
        <h3>误区3：省吃饭钱</h3>
        <p>为了省钱不吃早饭或吃泡面，身体出问题去医院花更多钱。</p>
        <h3>误区4：忽略小钱</h3>
        <p>每天一杯奶茶30元，一个月900，一年10800。小钱累计起来是大钱。</p>
        <h3>误区5：不用存钱工具</h3>
        <p>没有专门的存钱账户，钱随便放很容易花掉。设置自动转账存钱，眼不见心不烦。</p>
